name: Visual Regression (Percy)

on:
  push:
    branches: [main]
    paths:
      - 'static/**'
      - 'storybook/**'
      - 'visual-tests/**'
      - 'playwright.config.ts'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - 'static/**'
      - 'storybook/**'
      - 'visual-tests/**'
      - 'playwright.config.ts'
      - 'package.json'

jobs:
  visual-regression:
    name: Percy visual snapshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node / npm setup ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Playwright browser install ────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # ── Percy snapshot run ────────────────────────────────────────────────
      # PERCY_TOKEN must be added as a repository secret.
      # Percy blocks the PR check until diffs are reviewed and approved.
      - name: Run Percy visual snapshots
        run: npx percy exec -- npx playwright test
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}

      # ── Upload Playwright HTML report as artifact ─────────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: visual-tests/report/
          retention-days: 14
